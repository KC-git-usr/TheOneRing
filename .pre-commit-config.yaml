# .pre-commit-config.yaml
#
# Pre-commit hooks for The One Ring.
# Install once:  pip install pre-commit && pre-commit install
# Run manually:  pre-commit run --all-files
#
# Requires system tools: clang-format, clang-tidy, cpplint
#   sudo apt install clang-format clang-tidy
#   pip install cpplint
#
# NOTE: The clang-tidy hook requires a compilation database (build/compile_commands.json).
#   Build at least once with:  cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -S tor -B build
#   before running clang-tidy via pre-commit.

exclude: ^tor/log/
repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags (e.g. in ROS 2 files)
        additional_dependencies: [pyyaml]
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict

  # ── clang-format (uses .clang-format in repo root) ──────────────────────────
  # Uses the system clang-format so the version matches your toolchain.
  # Auto-fixes formatting in-place; git diff will show what changed.
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        language: system
        entry: clang-format
        args:
          - --style=file      # Reads .clang-format from the repo root
          - -i                # Fix in-place (auto-format)
        types_or: [c++, c]
        files: \.(cpp|cxx|cc|c|h|hpp|hxx)$

  # ── clang-tidy (uses .clang-tidy in repo root) ──────────────────────────────
  # Uses the compilation database at tor/build/compile_commands.json.
  # Only runs on .cpp/.cc files (clang-tidy resolves headers through them).
  #
  # Slow (~45s per file) — not included in `pre-commit run -a`.
  # Run explicitly:
  #   pre-commit run clang-tidy --all-files --hook-stage manual
  # Or use CMake integration:
  #   cmake -DENABLE_CLANG_TIDY=ON -S tor -B build && cmake --build build
      - id: clang-tidy
        name: clang-tidy
        language: system
        entry: clang-tidy
        args:
          - -p
          - tor/build
        types: [c++]
        files: \.(cpp|cxx|cc)$
        pass_filenames: true
        stages: [manual]

  # ── CMake lint & format (uses .cmake-format.yaml in repo root) ──────────────
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
      - id: cmake-lint
        additional_dependencies: [pyyaml]

  # ── cpplint (Google C++ Style Guide linter) ─────────────────────────────────
  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.0
    hooks:
      - id: cpplint
        args:
          # build/include_subdir: allow headers without matching subdir guard
          # legal/copyright: copyright header not enforced at hook level
          - --filter=-build/include_subdir,-legal/copyright,-whitespace/indent_namespace
          - --linelength=100
          - --counting=detailed
        types_or: [c++]
        files: \.(cpp|cxx|cc|h|hpp)$
